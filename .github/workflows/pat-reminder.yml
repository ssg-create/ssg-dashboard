name: PAT Renewal Reminder

on:
  schedule:
    # 14/05 todo ano, 12h UTC = 9h BRT — 14 dias antes do vencimento típico do PAT (30 dias)
    - cron: '0 12 14 5 *'
  workflow_dispatch:  # permite testar manualmente

permissions:
  issues: write
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open PAT renewal issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🔑 Renovar PAT GWMS Sync — vence em ~14 dias" \
            --body "$(cat <<'BODY'
          # Renovação do PAT GitHub

          **Lembrete automático.** O PAT classic usado pelo workflow GWMS Sync vence em ~14 dias.
          Sem renovar, o sync para de funcionar e a dashboard mostra dados parados.

          ## Checklist (3 passos manuais — só você pode fazer)

          - [ ] **Gerar novo PAT** em https://github.com/settings/tokens
            - Tipo: **classic**
            - Scopes: `repo` + `workflow`
            - Expiração: **90+ dias** (de preferência "no expiration" pra não repetir esse ciclo logo)
          - [ ] **Atualizar `~/.ssg_env`** no seu Mac local — linha `GITHUB_TOKEN=ghp_...`
            - ⚠️ NUNCA commitar esse arquivo
          - [ ] **Atualizar secret `GH_PAT_CROSS_REPO`** neste repo
            - Script bash pronto está em `~/.claude/projects/-Users-fabiotavares/memory/reference_ssg_dashboard.md` (seção "Renovação do PAT principal")
            - Ou GitHub UI: Settings → Secrets and variables → Actions → `GH_PAT_CROSS_REPO` → Update

          ## Validação pós-renovação

          ```bash
          set -a && source ~/.ssg_env && set +a && \
            curl -s -w "HTTP %{http_code}\n" -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/ssg-create/ssg-dashboard/actions/workflows/263763128/dispatches" \
              -d '{"ref":"main"}'
          ```

          Esperado: HTTP 204. Depois confira https://github.com/ssg-create/ssg-dashboard-data/commits/main — deve ter commits novos `chore: sync ...` em até 1min.

          Após validar, **fechar esta issue**.

          ---

          *Lembrete gerado pelo workflow `.github/workflows/pat-reminder.yml` (cron `0 12 14 5 *`).*
          BODY
          )"
