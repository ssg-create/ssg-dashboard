name: GWMS Sync

on:
  # Trigger primário: cron-job.org via workflow_dispatch (on-time, sem atraso).
  # Backup: schedule do GitHub Actions (atrasa 1-2h em horário de pico, mas cobre se cron-job.org cair).
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Validar secrets obrigatórios
        env:
          GH_REPO:   ${{ secrets.GH_REPO }}
          GWMS_USER: ${{ secrets.GWMS_USER }}
          GWMS_PASS: ${{ secrets.GWMS_PASS }}
        run: |
          MISSING=""
          [ -z "$GH_REPO" ]   && MISSING="$MISSING GH_REPO"
          [ -z "$GWMS_USER" ] && MISSING="$MISSING GWMS_USER"
          [ -z "$GWMS_PASS" ] && MISSING="$MISSING GWMS_PASS"
          if [ -n "$MISSING" ]; then
            echo "ERRO: secrets ausentes:$MISSING"
            exit 1
          fi
          echo "Secrets presentes. OK"

      - name: Puxar dados GWMS (silenciosos + triagem + reaberturas + utilização)
        env:
          GWMS_USER:    ${{ secrets.GWMS_USER }}
          GWMS_PASS:    ${{ secrets.GWMS_PASS }}
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:      ${{ secrets.GH_REPO }}
          GH_BRANCH:    data   # commits vão pra branch 'data' (Vercel não observa)
        run: python scripts/gwms_sync.py
