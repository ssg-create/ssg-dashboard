name: SSG Pipeline

on:
  schedule:
    - cron: '*/10 * * * *'   # a cada 10 min, 24h/dia, 7 dias/semana
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests urllib3 openpyxl

      # ── FASE 1: Fail fast — valida credenciais antes de qualquer trabalho
      - name: Validar secrets obrigatórios
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          OTRS_USER: ${{ secrets.OTRS_USER }}
          OTRS_PASS: ${{ secrets.OTRS_PASS }}
          OTRS_URL: ${{ secrets.OTRS_URL }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: |
          echo "Verificando secrets..."
          MISSING=""
          [ -z "$DEPLOY_TOKEN" ] && MISSING="$MISSING DEPLOY_TOKEN"
          [ -z "$OTRS_USER" ]    && MISSING="$MISSING OTRS_USER"
          [ -z "$OTRS_PASS" ]    && MISSING="$MISSING OTRS_PASS"
          [ -z "$OTRS_URL" ]     && MISSING="$MISSING OTRS_URL"
          [ -z "$GH_REPO" ]      && MISSING="$MISSING GH_REPO"
          if [ -n "$MISSING" ]; then
            echo "ERRO: secrets ausentes:$MISSING"
            exit 1
          fi
          echo "Secrets presentes. OK"

      - name: Validar token GitHub (autenticação)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: |
          HTTP=$(curl -s -o /tmp/gh_auth.json -w "%{http_code}"             -H "Authorization: token $DEPLOY_TOKEN"             -H "Accept: application/vnd.github+json"             "https://api.github.com/repos/$GH_REPO")
          if [ "$HTTP" != "200" ]; then
            echo "ERRO: token inválido ou sem acesso ao repo (HTTP $HTTP)"
            cat /tmp/gh_auth.json
            exit 1
          fi
          LOGIN=$(python3 -c "import json; d=json.load(open('/tmp/gh_auth.json')); print(d.get('full_name','?'))")
          echo "Token OK — repo acessível: $LOGIN"

      # Cache dos xlsx mensais (evita re-buscar meses fechados a cada run)
      - name: Restaurar cache de meses
        uses: actions/cache@v4
        with:
          path: ~/.ssg_cache
          key: ssg-meses-${{ hashFiles('scripts/znuny_export.py') }}
          restore-keys: ssg-meses-

      - name: Criar estrutura de pastas
        run: mkdir -p "${{ github.workspace }}/output/.cache"

      - name: Restaurar cache de meses anteriores
        run: |
          if [ -d "$HOME/.ssg_cache" ]; then
            cp -r "$HOME/.ssg_cache/." "${{ github.workspace }}/output/.cache/" 2>/dev/null || true
          fi

      - name: Exportar tickets (znuny_export)
        env:
          OTRS_USER: ${{ secrets.OTRS_USER }}
          OTRS_PASS: ${{ secrets.OTRS_PASS }}
          OTRS_URL: ${{ secrets.OTRS_URL }}
          WORK_DIR: ${{ github.workspace }}/output
        run: python scripts/znuny_export.py

      - name: Salvar cache de meses (limpeza de +6 meses)
        run: |
          mkdir -p "$HOME/.ssg_cache"
          cp -r "${{ github.workspace }}/output/.cache/." "$HOME/.ssg_cache/" 2>/dev/null || true
          find "$HOME/.ssg_cache" -name "*.xlsx" -mtime +180 -delete 2>/dev/null || true

      - name: Testes unitários
        run: node tests/unit.test.js

      - name: Análise AIOS
        env:
          WORK_DIR: ${{ github.workspace }}/output
        run: python scripts/aios_analysis.py

      - name: Injetar CACHE_VERSION no sw.js
        run: |
          VERSION="$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '$VERSION'/" sw.js
          cp "${{ github.workspace }}/sw.js" "${{ github.workspace }}/output/"
          echo "CACHE_VERSION atualizada para: $VERSION"

      - name: Deploy GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          GITHUB_REPO: ${{ secrets.GH_REPO }}
          WORK_DIR: ${{ github.workspace }}/output
        run: python scripts/github_deploy.py

      # ── Healthcheck: confirma que pipeline terminou com sucesso
      - name: Healthcheck ping (sucesso)
        if: success()
        env:
          HC_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HC_URL" ]; then
            curl -s --retry 3 --max-time 5 "$HC_URL" > /dev/null
            echo "Healthcheck pingado."
          fi

      # ── Alerta de falha: email + fallback via GitHub Issue
      - name: Notificar falha por email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true          # não deixa o alerta de email travar o fallback
        with:
          server_address: smtp.office365.com
          server_port: 587
          username: ${{ secrets.EMAIL_FROM }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "⚠️ SSG Dashboard — Falha no pipeline (GitHub Actions)"
          to: ${{ secrets.EMAIL_TO }}
          from: SSG Pipeline
          body: |
            O pipeline SSG falhou no GitHub Actions.

            Veja os logs em:
            https://github.com/${{ secrets.GH_REPO }}/actions

            Horário: ${{ github.run_started_at }}

      - name: Fallback — abrir GitHub Issue se email falhar
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
          RUN_ID: ${{ github.run_id }}
          RUN_TS: ${{ github.run_started_at }}
        run: |
          BODY="Pipeline SSG falhou em $RUN_TS.\n\nLogs: https://github.com/$GH_REPO/actions/runs/$RUN_ID"
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GH_REPO/issues" \
            -d "{\"title\":\"⚠️ Pipeline falhou — $(date -u +%Y-%m-%d)\"，\"body\":\"$BODY\",\"labels\":[\"pipeline-failure\"]}" \
            > /dev/null
          echo "Issue aberta em $GH_REPO como fallback de alerta."
