name: Sync Watchdog

# Monitora o workflow "GWMS Sync" com 3 niveis de acao:
#  1) AUTO-CURA: se passou >20min sem run bem-sucedida, dispara o gwms-sync.yml
#     via workflow_dispatch antes de qualquer alerta.
#  2) ALERTA SUAVE: se auto-cura ja foi tentada e ainda esta parado, abre/atualiza issue.
#  3) ALERTA DURO: se 3+ runs consecutivas falharam, abre issue imediatamente.
#
# Roda a cada 5 minutos e dispara o sync via PAT quando o dado passa de ~6min.
# Virou o MOTOR do sync: nao depende de cron-job.org nem de maquina local.
#
# Criado em 26/05/2026; auto-cura corrigida em 12/06/2026 (usar PAT no dispatch).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verificar saude do GWMS Sync (com auto-cura)
        uses: actions/github-script@v7
        env:
          DISPATCH_PAT: ${{ secrets.GH_PAT_CROSS_REPO }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner, repo,
              workflow_id: 'gwms-sync.yml',
              per_page: 10
            });
            const items = runs.data.workflow_runs;
            if (!items.length) {
              core.info('Nenhuma run encontrada.');
              return;
            }

            let consecFails = 0;
            for (const r of items) {
              if (r.conclusion === 'failure') consecFails++;
              else break;
            }

            const lastSuccess = items.find(r => r.conclusion === 'success');
            const ageMin = lastSuccess
              ? Math.round((Date.now() - new Date(lastSuccess.created_at).getTime()) / 60000)
              : 9999;

            core.info('Falhas consecutivas: ' + consecFails + ' | Ultima success (run) ha ' + ageMin + 'min');

            // ---- FRESCOR REAL: idade do DADO (generated_at), nao sucesso de run ----
            // Runs manuais mascaravam a realidade (run "success" recente, mas o dado
            // podia estar velho). Medimos a idade do tickets_ativos.json publicado.
            let dataAgeMin = 9999;
            try {
              const dr = await fetch('https://raw.githubusercontent.com/ssg-create/ssg-dashboard-data/main/tickets_ativos.json',
                { headers: process.env.DISPATCH_PAT ? { Authorization: 'Bearer ' + process.env.DISPATCH_PAT } : {} });
              if (dr.ok) {
                const dj = await dr.json();
                if (dj.generated_at) dataAgeMin = Math.round((Date.now() / 1000 - dj.generated_at) / 60);
              }
            } catch (e) {
              core.warning('Watchdog: falha lendo frescor do dado: ' + e.message);
            }
            core.info('Idade do DADO: ' + dataAgeMin + 'min');

            // ---- AUTO-CURA ----
            // FIX (12/06): dispara via PAT, NAO via GITHUB_TOKEN (o GitHub suprime
            // workflow disparado pelo GITHUB_TOKEN — protecao anti-loop). E decide
            // pela idade do DADO, nao por sucesso de run.
            const STALE_MIN = 6;
            if (dataAgeMin > STALE_MIN && consecFails < 3) {
              const running = items.find(r => r.status === 'in_progress' || r.status === 'queued');
              if (running) {
                core.info('Sync stale, mas ha run em andamento (#' + running.run_number + '). Aguardando.');
              } else if (!process.env.DISPATCH_PAT) {
                core.warning('AUTO-CURA impossivel: secret GH_PAT_CROSS_REPO ausente. Configure um PAT com escopo Actions: write.');
              } else {
                core.info('AUTO-CURA: disparando gwms-sync.yml via PAT (workflow_dispatch).');
                try {
                  const dispatcher = require('@actions/github').getOctokit(process.env.DISPATCH_PAT);
                  await dispatcher.rest.actions.createWorkflowDispatch({
                    owner, repo,
                    workflow_id: 'gwms-sync.yml',
                    ref: 'main'
                  });
                  core.info('Dispatch (PAT) enviado — o sync deve iniciar em segundos.');
                } catch (e) {
                  core.warning('Falha ao disparar auto-cura via PAT: ' + e.message + ' (o PAT tem escopo Actions: write neste repo?)');
                }
              }
            }

            // ---- ALERTAS ----
            let shouldAlert = false;
            let reason = '';
            if (consecFails >= 3) {
              shouldAlert = true;
              reason = consecFails + ' runs falharam seguidas';
            } else if (dataAgeMin > 60) {
              shouldAlert = true;
              reason = 'Dado parado ha ' + dataAgeMin + ' minutos (auto-cura nao resolveu)';
            }
            if (!shouldAlert) {
              core.info('Sync saudavel ou auto-cura em andamento - sem alerta.');
              return;
            }

            const existing = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'open',
              labels: 'sync-watchdog'
            });
            if (existing.data.length) {
              core.info('Issue de alerta ja existe (#' + existing.data[0].number + '). Atualizando.');
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: existing.data[0].number,
                body: 'Watchdog ainda detecta problema: **' + reason + '**\n\n_Verificacao automatica em ' + new Date().toISOString() + '_'
              });
              return;
            }

            const lastRun = items[0];
            const body = [
              '## GWMS Sync com problema',
              '',
              '**Motivo do alerta:** ' + reason,
              '',
              '### Diagnostico',
              '- Ultima run: [#' + lastRun.run_number + '](' + lastRun.html_url + ') - ' + lastRun.conclusion,
              '- Falhas consecutivas: ' + consecFails,
              '- Ultima sync bem-sucedida: ' + (ageMin === 9999 ? 'nenhuma encontrada' : 'ha ' + ageMin + ' minutos'),
              '- Auto-cura: o watchdog ja tentou disparar o sync nas ultimas execucoes',
              '',
              '### Proximos passos',
              '1. Verificar status do cron-job.org (https://console.cron-job.org/jobs)',
              '2. Verificar PAT (Authorization header) - pode ter expirado',
              '3. Verificar logs da ultima run no Actions',
              '4. Apos resolver, **feche esta issue**',
              '',
              '---',
              '_Gerado automaticamente pelo workflow Sync Watchdog._'
            ].join('\n');

            const created = await github.rest.issues.create({
              owner, repo,
              title: 'GWMS Sync travado - ' + reason,
              body,
              labels: ['sync-watchdog', 'bug']
            });
            core.info('Issue criada: #' + created.data.number);
