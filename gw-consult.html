<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GW Consult — Base de Conhecimento TOTVS</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #6c63ff;
    --text: #e8eaf0;
    --muted: #7b82a0;
    --ok: #3ecf8e;
    --warn: #f5a623;
    --danger: #f45b5b;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: .5px;
  }
  .logo-name { font-size: 17px; font-weight: 600; color: var(--text); }
  .logo-sep { color: var(--border); font-size: 20px; }
  .logo-sub { font-size: 13px; color: var(--muted); }
  .header-right { font-size: 12px; color: var(--muted); }
  .header-right span { color: var(--ok); }

  /* ── Hero search ── */
  .hero {
    background: linear-gradient(160deg, #161a2e 0%, #0f1117 60%);
    border-bottom: 1px solid var(--border);
    padding: 40px 32px 32px;
    text-align: center;
  }
  .hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .hero p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

  .search-bar {
    display: flex;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto 16px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: 15px;
    padding: 12px 16px;
    border-radius: var(--radius);
    outline: none;
    transition: border .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .btn-search {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .btn-search:hover { opacity: .85; }
  .btn-search:disabled { opacity: .4; cursor: default; }

  /* ── Filtros de produto ── */
  .filters {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 720px;
    margin: 0 auto;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .3px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Quick searches ── */
  .quick-wrap {
    max-width: 720px;
    margin: 14px auto 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .quick-tag {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
  }
  .quick-tag:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Results area ── */
  main { max-width: 800px; margin: 0 auto; padding: 28px 24px; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .results-count strong { color: var(--text); }

  /* ── Article card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: border-color .2s, transform .1s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    display: block;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .card-title:hover { text-decoration: underline; }
  .card-snippet {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .card-snippet em { color: var(--text); font-style: normal; font-weight: 600; }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .card-labels { display: flex; gap: 6px; flex-wrap: wrap; }
  .label {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .card-date { font-size: 11px; color: var(--muted); }
  .btn-view {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    transition: all .2s;
  }
  .btn-view:hover { background: var(--accent); color: #fff; }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 24px;
  }
  .page-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all .2s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: .3; cursor: default; }

  /* ── States ── */
  .state-box {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }
  .state-box .icon { font-size: 36px; margin-bottom: 12px; }
  .state-box h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .state-box p { font-size: 13px; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsivo ── */
  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .hero { padding: 28px 16px 24px; }
    .search-bar { flex-direction: column; }
    main { padding: 20px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">GW</span>
    <span class="logo-sep">|</span>
    <span class="logo-name">Consult</span>
    <span class="logo-sub">Base de Conhecimento TOTVS</span>
  </div>
  <div class="header-right">powered by <span>TOTVS Central do Conhecimento</span></div>
</header>

<div class="hero">
  <h1>Encontre a solução antes de escalar</h1>
  <p>Busca unificada em +572k artigos — SITUAÇÃO + SOLUÇÃO prontas para usar</p>

  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="Ex: erro 56556 faturamento, NF-e rejeitada, estoque negativo..." autocomplete="off" />
    <button class="btn-search" id="btnSearch" onclick="doSearch()">Buscar</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-product="" onclick="setProduct(this, '')">Todos</button>
    <button class="filter-btn" data-product="Datasul" onclick="setProduct(this, 'Datasul')">Datasul</button>
    <button class="filter-btn" data-product="Protheus" onclick="setProduct(this, 'Protheus')">Protheus</button>
    <button class="filter-btn" data-product="Linha RM" onclick="setProduct(this, 'Linha RM')">Linha RM</button>
    <button class="filter-btn" data-product="Fluig" onclick="setProduct(this, 'Fluig')">Fluig</button>
    <button class="filter-btn" data-product="TOTVS Backoffice" onclick="setProduct(this, 'TOTVS Backoffice')">Backoffice</button>
  </div>

  <div class="quick-wrap" id="quickWrap"></div>
</div>

<main>
  <div id="resultsArea">
    <div class="state-box">
      <div class="icon">🔍</div>
      <h3>Digite o problema do chamado</h3>
      <p>Use termos do assunto do ticket: módulo, função, mensagem de erro</p>
    </div>
  </div>
</main>

<script>
var activeProduct = '';
var currentPage   = 1;
var lastQuery     = '';
var totalCount    = 0;

var QUICK_ALL = [
  'faturamento NF-e', 'estoque negativo', 'SPED fiscal', 'folha de pagamento',
  'integração contábil', 'TOTVS Backoffice', 'erro de acesso', 'relatório não gera'
];
var QUICK_PRODUCT = {
  'Datasul':         ['FT4003 faturamento', 'MFT nota fiscal', 'erro RE1001', 'MCP financeiro', 'MCE estoque'],
  'Protheus':        ['NF-e rejeição', 'SIGAFAT faturamento', 'SIGAEST estoque', 'SIGAFIN financeiro', 'MATA460'],
  'Linha RM':        ['TOTVS Folha', 'RH férias', 'CORPORE RM', 'FOP pagamento', 'ponto eletrônico'],
  'Fluig':           ['workflow aprovação', 'formulário Fluig', 'processo BPM', 'integração REST'],
  'TOTVS Backoffice':['Backoffice integração', 'DMSCONPAY', 'contas a pagar', 'conciliação bancária'],
};

function renderQuickTags() {
  var tags = activeProduct ? (QUICK_PRODUCT[activeProduct] || QUICK_ALL) : QUICK_ALL;
  var wrap = document.getElementById('quickWrap');
  wrap.innerHTML = tags.map(function(t) {
    return '<button class="quick-tag" onclick="quickSearch(\'' + t.replace(/'/g, "\\'") + '\')">' + t + '</button>';
  }).join('');
}

function setProduct(el, product) {
  activeProduct = product;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  renderQuickTags();
  if (lastQuery) doSearch();
}

function quickSearch(term) {
  document.getElementById('searchInput').value = term;
  doSearch();
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch(page) {
  var q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  lastQuery  = q;
  currentPage = page || 1;
  fetchResults(q, activeProduct, currentPage);
}

function fetchResults(query, product, page) {
  var area = document.getElementById('resultsArea');
  area.innerHTML = '<div class="state-box"><div class="spinner"></div><p>Consultando base TOTVS...</p></div>';

  var url = '/api/totvs-search?query=' + encodeURIComponent(query) + '&per_page=10&page=' + page;
  if (product) url += '&product=' + encodeURIComponent(product);

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { showError(data.error); return; }
      totalCount = data.count || 0;
      renderResults(data);
    })
    .catch(function(err) { showError('Falha na conexão: ' + err.message); });
}

function renderResults(data) {
  var area = document.getElementById('resultsArea');
  if (!data.results || data.results.length === 0) {
    area.innerHTML = '<div class="state-box"><div class="icon">😕</div><h3>Nenhum artigo encontrado</h3><p>Tente termos diferentes ou remova o filtro de produto</p></div>';
    return;
  }

  var pageCount = data.page_count || 1;
  var html = '<div class="results-header">';
  html += '<span class="results-count"><strong>' + totalCount.toLocaleString('pt-BR') + '</strong> artigos encontrados';
  if (activeProduct) html += ' em <strong>' + activeProduct + '</strong>';
  html += '</span>';
  html += '<span>Página ' + currentPage + ' de ' + pageCount + '</span>';
  html += '</div>';

  data.results.forEach(function(r) {
    var date = r.updated_at ? new Date(r.updated_at).toLocaleDateString('pt-BR') : '';
    var snippet = (r.snippet || '').replace(/<[^>]+>/g, '').substring(0, 220);
    var labels = (r.labels || []).slice(0, 3);

    html += '<div class="card">';
    html += '<a class="card-title" href="' + r.url + '" target="_blank" rel="noopener">' + escHtml(r.title) + ' ↗</a>';
    if (snippet) html += '<div class="card-snippet">' + r.snippet.substring(0, 320) + '...</div>';
    html += '<div class="card-footer">';
    html += '<div class="card-labels">';
    labels.forEach(function(l) { html += '<span class="label">' + escHtml(l) + '</span>'; });
    html += '</div>';
    if (date) html += '<span class="card-date">Atualizado ' + date + '</span>';
    html += '<a class="btn-view" href="' + r.url + '" target="_blank" rel="noopener">Ver solução ↗</a>';
    html += '</div></div>';
  });

  // Paginação
  if (pageCount > 1) {
    html += '<div class="pagination">';
    html += '<button class="page-btn" onclick="doSearch(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>← Anterior</button>';
    html += '<button class="page-btn" onclick="doSearch(' + (currentPage + 1) + ')" ' + (currentPage >= pageCount ? 'disabled' : '') + '>Próxima →</button>';
    html += '</div>';
  }

  area.innerHTML = html;
  window.scrollTo({ top: 300, behavior: 'smooth' });
}

function showError(msg) {
  document.getElementById('resultsArea').innerHTML =
    '<div class="state-box"><div class="icon">⚠️</div><h3>Erro ao consultar</h3><p>' + escHtml(msg) + '</p></div>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
renderQuickTags();
</script>
</body>
</html>
